name: Daily Horizon Summary

on:
  schedule:
    - cron: '30 15 * * *'  # 23:30 Asia/Shanghai
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Commit generated site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/_posts/*.md docs/feed-*.xml
          if git diff --cached --quiet; then
            echo "No generated site changes to commit."
            exit 0
          fi
          git commit -m "Daily Horizon summary: ${DATE}"
          git pull --rebase origin main
          git push origin HEAD:main
